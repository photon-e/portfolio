<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Portfolio{% endblock %}</title>
    <meta name="description" content="Personal developer portfolio for a mechatronics engineer, Django backend developer, and networking-focused builder.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        accent: '#38bdf8'
                    },
                    boxShadow: {
                        glow: '0 0 0 1px rgba(56, 189, 248, 0.2), 0 10px 30px rgba(15, 23, 42, 0.45)'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-950 text-slate-100 antialiased selection:bg-sky-400/30 selection:text-white">
    <div class="min-h-screen">
        <header class="sticky top-0 z-50 border-b border-white/10 bg-slate-950/90 backdrop-blur">
            <nav class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
                <a href="/" class="text-base font-semibold tracking-[0.2em] text-slate-100 uppercase transition hover:text-accent">Placeholder Name</a>
                <div class="flex items-center gap-2 text-sm text-slate-300 sm:gap-4">
                    <a href="/projects/" class="rounded-full px-3 py-2 transition hover:bg-white/5 hover:text-white">Projects</a>
                    <a href="/about/" class="rounded-full px-3 py-2 transition hover:bg-white/5 hover:text-white">About</a>
                    <a href="/contact/" class="rounded-full border border-white/10 px-3 py-2 transition hover:border-accent/40 hover:text-white">Contact</a>
                </div>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer class="border-t border-white/10 py-10">
            <div class="mx-auto flex max-w-6xl flex-col gap-4 px-4 text-sm text-slate-400 sm:px-6 lg:flex-row lg:items-center lg:justify-between lg:px-8">
                <p>Backend systems, mechatronics, networking, and security for real-world deployment.</p>
                <div class="flex gap-4">
                    <a href="https://twitter.com/jah_3li" class="transition hover:text-accent">Twitter</a>
                    <a href="mailto:hello@example.com" class="transition hover:text-accent">Email</a>
                </div>
            </div>
        </footer>
    </div>
</body>
</html>
